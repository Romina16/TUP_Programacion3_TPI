<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-card">
            
        <div class = "login-card_logo">
                <h2 class="Login-card_titulo">Food Store</h2>
                <p class="Login-card_subtitulo">Inicia sesión</p>
        </div>

        <form class="login-form">
            <label class="login-form_label" for="email">Correo electrónico:</label>
            <input class="login-form_input" id="email" type="email" name="email" placeholder="tucorreo@ejemplo.com " required>
            
            <label class="login-form_label" for="password">Contraseña:</label>
            <input class="login-form_input" id="password" type ="password" name="password" placeholder="Minimo 8 caracteres" required>
            
            <button class="login-form_button" type="submit">Ingresar</button>
        </form>
        <p class="login-card_registro">
            ¿No tenés cuenta? <a href="#">Registrate acá</a>
        </p>

    </div>
</body>
</html>
