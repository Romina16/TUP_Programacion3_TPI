<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi carrito</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <header>
        <h1>Food Store</h1>   
        <nav>
            <ul>
                <li><a href="../home/home.html">Catálogo</a></li>
                <li><a href="#">Carrito</a></li>
            </ul>
        </nav>
    </header>

    <main class="cart-container">

        <div class="cart-content-wrapper"> 
            <!-- mostrar los productos -->
            <h1 class="main-title">Mi Carrito</h1>
            
            <div class="cart-layout">
                <!-- mostrar resumen -->
                <section id="itemsList" class="cart-items">
                    </section>

                <aside class="cart-summary">
                    <h2>Resumen</h2>
                    
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="summarySubtotal">$0</span>
                    </div>
                    
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="summaryTotal">$0</span>
                    </div>
                    
                    <button id="btnFinalizar" class="btn-checkout" disabled>Finalizar compra</button>
                    <p class="warning-text" style="color: #666; font-size: 0.9rem; margin-top: 10px;">⚠️ El checkout no está disponible en esta versión.</p>
                    
                    <button id="btnVaciar" class="btn-empty">Vaciar carrito</button>
                </aside>
                
            </div>
        </div>
    </main> 

    <script type="module" src="./cart.ts"></script>
</body>
</html>
