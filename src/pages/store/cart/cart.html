<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi carrito</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <header>
        <h1>Food Store</h1>
        <nav>
            <ul>
                <li><a href="../home/home.html">Catálogo</a></li>
                <li><a href="#">Carrito</a></li>
            </ul>
        </nav>
    </header>

    <main class="cart-container">
        <div class="cart-content-wrapper">
            <h1 class="main-title">Mi Carrito</h1>

            <div class="cart-layout">
                <section id="itemsList" class="cart-items"></section>

                <aside class="cart-summary">
                    <h2>Resumen</h2>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="summarySubtotal">$0</span>
                    </div>
                    <div class="summary-row">
                        <span>Envío</span>
                        <span id="summaryEnvio">$0</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="summaryTotal">$0</span>
                    </div>

                    <button id="btnFinalizar" class="btn-checkout" disabled>Proceder al pago</button>
                    <button id="btnVaciar" class="btn-empty">Vaciar carrito</button>
                </aside>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">&times;</button>
            <h2>Completar Pedido</h2>
            <form id="checkoutForm" class="checkout-form">
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ej: +54 9 261 123-4567" required />
                </div>
                <div class="form-group">
                    <label for="direccion">Dirección de Entrega</label>
                    <textarea id="direccion" name="direccion" rows="2" placeholder="Calle, número, piso, depto" required></textarea>
                </div>
                <div class="form-group">
                    <label for="formaPago">Método de Pago</label>
                    <select id="formaPago" name="formaPago" required>
                        <option value="">Seleccione un método</option>
                        <option value="TARJETA">Tarjeta</option>
                        <option value="TRANSFERENCIA">Transferencia</option>
                        <option value="EFECTIVO">Efectivo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notas">Notas adicionales (opcional)</label>
                    <textarea id="notas" name="notas" rows="2" placeholder="Instrucciones especiales, timbre, etc."></textarea>
                </div>
                <p class="error-msg" id="checkoutError" hidden></p>
                <div class="checkout-total">
                    <span>Total a pagar:</span>
                    <span id="checkoutTotal">$0</span>
                </div>
                <button type="submit" class="btn-checkout">Confirmar Pedido</button>
            </form>
        </div>
    </div>

    <script type="module" src="./cart.ts"></script>
</body>
</html>
