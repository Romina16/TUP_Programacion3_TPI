<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Registro</title>
    <link rel="stylesheet" href="../../../../css/styles.css">
    <link rel="stylesheet" href="../../../../css/login.css"> 
</head>
<body>

    <div class="login-card">
        <div class="login-card_logo">
            <h2 class="login-card_titulo">Crear Cuenta</h2>
            <p class="login-card_subtitle">Completá tus datos para empezar</p>
        </div>

        <form id="register-form" class="login-form">
            <div class="form-group">
                <label class="login-form_label" for="fullname">Nombre Completo:</label>
                <input class="login-form_input" type="text" id="fullname" name="fullname" 
                       placeholder="Tu nombre y apellido" required minlength="3">
            </div>

            <div class="form-group">
                <label class="login-form_label" for="email">Correo electrónico:</label>
                <input class="login-form_input" type="email" id="email" name="email" 
                       placeholder="tucorreo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label class="login-form_label" for="password">Contraseña:</label>
                <input class="login-form_input" type="password" id="password" name="password" 
                       placeholder="Mínimo 8 caracteres" required minlength="8">
            </div>

            <div class="form-group">
                <label class="login-form_label" for="confirm-password">Confirmar Contraseña:</label>
                <input class="login-form_input" type="password" id="confirm-password" 
                       name="confirm-password" placeholder="Repetí tu contraseña" required>
            </div>
            <p id="error-msg" hidden style="color: red; text-align: center; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px;"></p>
            <p id="success-msg" hidden style="color: green; text-align: center; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px;"></p>

            <button class="login-form_button" type="submit">Registrarse</button>
        </form>

        <p class="login-card_registro">
            ¿Ya tenés cuenta? <a href="../login/index.html">Iniciá sesión acá</a>
        </p>
    </div>

    <!-- Script de lógica (si vas a usar TypeScript con Vite) -->
    <script type="module" src="./registro.ts"></script>
</body>
</html>
