<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store - Registro</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-card_logo">🍔</div>
    <h1 class="login-card_titulo">Food Store</h1>
    <p class="login-card_subtitulo">Creá tu cuenta</p>

    <form class="login-form" id="registro-form">
      <label class="login-form_label" for="nombre">Nombre</label>
      <input class="login-form_input" type="text" id="nombre" name="nombre" required />

      <label class="login-form_label" for="apellido">Apellido</label>
      <input class="login-form_input" type="text" id="apellido" name="apellido" required />

      <label class="login-form_label" for="mail">Email</label>
      <input class="login-form_input" type="email" id="mail" name="mail" required />

      <label class="login-form_label" for="celular">Celular (opcional)</label>
      <input class="login-form_input" type="tel" id="celular" name="celular" />

      <label class="login-form_label" for="password">Contraseña</label>
      <input class="login-form_input" type="password" id="password" name="password" minlength="6" required />

      <p class="error-msg" id="error-msg" hidden></p>

      <button class="login-form_button" type="submit">Crear cuenta</button>
    </form>

    <p class="login-card_registro">
      ¿Ya tenés cuenta? <a href="/src/pages/auth/login/index.html">Iniciar sesión</a>
    </p>
  </div>

  <script type="module" src="./registro.ts"></script>
</body>
</html>
