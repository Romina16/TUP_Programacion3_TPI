<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store - Ingresar</title>
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
  <div class="login-card">
    <div class="login-card_logo">🍔</div>
    <h1 class="login-card_titulo">Food Store</h1>
    <p class="login-card_subtitulo">Ingresá a tu cuenta</p>

    <form class="login-form" id="login-form">
      <label class="login-form_label" for="mail">Email</label>
      <input class="login-form_input" type="email" id="mail" name="mail" autocomplete="email" placeholder="tu@mail.com" required />

      <label class="login-form_label" for="password">Contraseña</label>
      <input class="login-form_input" type="password" id="password" name="password" autocomplete="current-password" placeholder="********" required />

      <p class="error-msg" id="error-msg" hidden></p>

      <button class="login-form_button" type="submit">Ingresar</button>
    </form>

    <p class="login-card_registro">
      ¿No tenés cuenta? <a href="/src/pages/auth/registro/index.html">Registrate</a>
    </p>
  </div>

  <script type="module" src="./login.ts"></script>
</body>
</html>
