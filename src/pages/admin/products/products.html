<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store - Productos</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <header>
    <h1>Food Store Admin</h1>
    <nav>
      <ul>
        <li><a href="../../store/home/home.html">Ver Tienda</a></li>
        <li><button class="logout-button" id="btnLogout">Salir</button></li>
      </ul>
    </nav>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <ul>
        <li><a href="../adminHome/adminHome.html">Dashboard</a></li>
        <li><a href="../categories/categories.html">Categorías</a></li>
        <li><a href="./products.html" class="active">Productos</a></li>
        <li><a href="../orders/orders.html">Pedidos</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="admin-header-actions">
        <h2>Productos</h2>
        <button class="btn-checkout" id="btnNuevo" style="width:auto;padding:0.8rem 1.5rem;">+ Nuevo Producto</button>
      </div>
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th><th>Imagen</th><th>Nombre</th><th>Descripción</th>
            <th>Precio</th><th>Categoría</th><th>Stock</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&times;</button>
      <h2 id="modalTitle">Nuevo Producto</h2>
      <form id="form">
        <input type="hidden" id="prodId" />
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>
        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" required></textarea>
        </div>
        <div class="form-group">
          <label for="precio">Precio</label>
          <input type="number" id="precio" min="0.01" step="0.01" required />
        </div>
        <div class="form-group">
          <label for="stock">Stock</label>
          <input type="number" id="stock" min="0" step="1" required />
        </div>
        <div class="form-group">
          <label for="categoriaId">Categoría</label>
          <select id="categoriaId" required></select>
        </div>
        <div class="form-group">
          <label for="imagen">Imagen (URL)</label>
          <input type="text" id="imagen" required />
        </div>
        <div class="form-group">
          <label for="disponible">Disponible</label>
          <select id="disponible">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select>
        </div>
        <p class="error-msg" id="formError" hidden></p>
        <button type="submit" class="btn-checkout">Guardar</button>
      </form>
    </div>
  </div>

  <script type="module" src="./products.ts"></script>
</body>
</html>
