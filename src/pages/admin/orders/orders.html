<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store - Gestión de Pedidos</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <header>
    <h1>Food Store Admin</h1>
    <nav>
      <ul>
        <li><a href="../../store/home/home.html">Ver Tienda</a></li>
        <li><button class="logout-button" id="btnLogout">Salir</button></li>
      </ul>
    </nav>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <ul>
        <li><a href="../adminHome/adminHome.html">Dashboard</a></li>
        <li><a href="../categories/categories.html">Categorías</a></li>
        <li><a href="../products/products.html">Productos</a></li>
        <li><a href="./orders.html" class="active">Pedidos</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="admin-header-actions">
        <h2>Gestión de Pedidos</h2>
        <select class="sort-select" id="filtroEstado">
          <option value="">Filtrar por estado: Todos</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="CONFIRMADO">Confirmado</option>
          <option value="TERMINADO">Terminado</option>
          <option value="CANCELADO">Cancelado</option>
        </select>
      </div>
      <div id="ordersList"></div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
